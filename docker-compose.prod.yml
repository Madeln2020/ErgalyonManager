# ═══════════════════════════════════════════════════════════════════
# EDM v2 — Docker Compose (Production)
# ═══════════════════════════════════════════════════════════════════
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f

services:
  # ── Reverse proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - edm-net

  # ── Backend API (FastAPI + uvicorn) ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
      APP_NAME: "EDM v2"
      ENVIRONMENT: production
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "8887"
      LOG_LEVEL: INFO
      DATABASE_URL: "postgresql+asyncpg://edm:${DB_PASSWORD:-edm_password}@postgres:5432/edm_v2"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      CORS_ORIGINS: '["http://localhost","http://localhost:80"]'
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edm-net

  # ── Frontend (Next.js standalone) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
    restart: unless-stopped
    networks:
      - edm-net

  # ── Celery worker (async enrichment) ───────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: "postgresql+asyncpg://edm:${DB_PASSWORD:-edm_password}@postgres:5432/edm_v2"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edm-net

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: edm_v2
      POSTGRES_USER: edm
      POSTGRES_PASSWORD: "${DB_PASSWORD:-edm_password}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edm -d edm_v2"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edm-net

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edm-net

volumes:
  pgdata:
  redis_data:
  uploads:
  nginx_cache:

networks:
  edm-net:
    driver: bridge
