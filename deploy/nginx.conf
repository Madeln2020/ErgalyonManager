# ═══════════════════════════════════════════════════════════════════
# EDM v2 — Nginx Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════════════
# Place at /etc/nginx/sites-available/edm-v2 or mount as volume.
# Enable: ln -s /etc/nginx/sites-available/edm-v2 /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

upstream backend {
    server backend:8887;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Max upload size (for invoice PDFs, images up to 50MB) ─────
    client_max_body_size 50M;

    # ── API proxy (backend) ───────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Metrics & health (backend) ────────────────────────────────
    location /metrics {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Docs (backend) ────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Static assets (frontend) ──────────────────────────────────
    location /_next/static {
        proxy_pass http://frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /static {
        proxy_pass http://frontend;
        expires 30d;
    }

    # ── Everything else → frontend ────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Deny access to hidden files ───────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
}
