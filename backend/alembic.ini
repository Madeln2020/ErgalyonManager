# ═══════════════════════════════════════════════════════════════════
# EDM v2.1 — Alembic Configuration (async migrations)
# ═══════════════════════════════════════════════════════════════════
# Usage:  cd backend && alembic upgrade head
#         cd backend && alembic revision --autogenerate -m "description"
# ═══════════════════════════════════════════════════════════════════

[alembic]
# Path to migration scripts
script_location = alembic

# The path to the Alembic config file (relative to script_location)
config = alembic.ini

# SQLAlchemy URL for offline mode (overridden by DATABASE_URL in env.py)
sqlalchemy.url = postgresql+asyncpg://edm:edm_password@localhost:5432/edm_v2

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
